<!DOCTYPE html>
<html>
<head>
  <title>Landing Page</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #eef2ff;
      margin: 0;
    }

    .hero {
      padding: 100px 20px;
    }

    h1 {
      font-size: 40px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #4f46e5;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #3730a3;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>Welcome to My Website 🚀</h1>
  <p>This is my first landing page</p>
  <button>Get Started</button>
</div>

</body>
</html>
